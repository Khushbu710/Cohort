# Local Midnight devnet — node + proof server + indexer.
#
# Not required for Phase 0/1 (the CohortDataset walking skeleton is verified
# via the Compact TS simulator in contracts/tests). This becomes necessary
# from Phase 3 onward, when the frontend talks to a real deployed contract
# through a real wallet.
#
# Image versions match midnightntwrk/example-counter's counter-cli/standalone.yml
# exactly (the official starter template's own CI-verified local devnet stack),
# paired with the same @midnight-ntwrk/* npm package versions that project pins —
# see contracts/package.json, scripts/package.json, frontend/package.json.
#
# Usage: `docker compose up -d` (or `pnpm devnet:up`), then:
#   Node:          http://127.0.0.1:9944
#   Proof server:  http://127.0.0.1:6300
#   Indexer:       http://127.0.0.1:8088/api/v3/graphql
services:
  node:
    image: "midnightntwrk/midnight-node:0.22.3"
    container_name: "cohort-midnight-node"
    ports:
      - "127.0.0.1:9944:9944"
    environment:
      CFG_PRESET: "dev"
      SIDECHAIN_BLOCK_BENEFICIARY: "04bcf7ad3be7a5c790460be82a713af570f22e0f801f6659ab8e84a52be6969e"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9944/health"]
      interval: 2s
      timeout: 5s
      retries: 20
      start_period: 20s

  proof-server:
    image: "midnightntwrk/proof-server:8.0.3"
    container_name: "cohort-proof-server"
    command: ["midnight-proof-server", "-v"]
    ports:
      - "127.0.0.1:6300:6300"
    environment:
      RUST_BACKTRACE: "full"
    healthcheck:
      test: ["CMD-SHELL", "echo > /dev/tcp/127.0.0.1/6300"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 10s

  indexer:
    image: "midnightntwrk/indexer-standalone:4.0.0"
    container_name: "cohort-indexer"
    ports:
      - "127.0.0.1:8088:8088"
    environment:
      RUST_LOG: "indexer=info,chain_indexer=info,indexer_api=info,wallet_indexer=info,indexer_common=info,fastrace_opentelemetry=off,info"
      APP__INFRA__NODE__URL: "ws://node:9944"
      APP__APPLICATION__NETWORK_ID: "undeployed"
      APP__INFRA__STORAGE__PASSWORD: "indexer"
      APP__INFRA__PUB_SUB__PASSWORD: "indexer"
      APP__INFRA__LEDGER_STATE_STORAGE__PASSWORD: "indexer"
      APP__INFRA__SECRET: "303132333435363738393031323334353637383930313233343536373839303132"
    healthcheck:
      test: ["CMD-SHELL", "cat /var/run/indexer-standalone/running"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 10s
    depends_on:
      node:
        condition: service_healthy
